<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    


    <style>

        body{
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .contenedor{
            width: 100%;
            max-width: 450px;
        }

        .formulario{
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .formulario h2{
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .grupo{
            margin-bottom: 20px;
        }

        .grupo label{
            display: block;
            margin-bottom: 8PX;
            color: #555;
            font-weight: 500;
        }

        .grupo input,
        .grupo select,
        .grupo textarea{
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .grupo input:focus,
        .grupo select:focus,
        .grupo textarea:focus{
            outline: none;
            border-color: #667eea;
        }

        .btn-enviar{
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor:pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-enviar:hover{
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 480px){
            .formulario{
                padding: 25px;
            }
        }

    </style>

</head>
<body>

    <div class="contenedor">
        <form action="" class="formulario">
            <h2>Contactanos</h2>
            <div class="grupo">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Tu nombre" required>
            </div>

            <div class="grupo">
                <label for="email">Correo electronico</label>
                <input type="email" id="email" placeholder="tu@gmail.com" required>
            </div>

            <div class="grupo">
                <label for="asunto">Asunto</label>
                <select name="" id="asunto" required>
                    <option value="">Selecciona un asunto</option>
                    <option value="Consulta">Consulta</option>
                    <option value="Soporte">Soporte tecnico</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>

            <div class="grupo">
                <label for="mensaje">Mensaje</label>
                <textarea name="" id="mensaje" rows="5" placeholder="Escribe tu mensaje..." required></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar mensaje</button>
        </form>
    </div>
    
</body>
</html>
