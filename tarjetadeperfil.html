<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lord Galdámez</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icons/Icon-IA.png">

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .tarjeta{
            background-color: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        .foto{
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 4px solid #3883f6;
        }

        .nombre{
            color: #1e3a5f;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .descripcion{
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .button{
            background-color: #3883f6;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .button:hover{
            background-color: #50145f;
        }

    </style>

</head>
<body>

    <div class="tarjeta">
        <img src="icons/Me.jpeg" alt="Mi foto" class="mi foto">
        <h2 class="nombre">Daniel Galdámez</h2>
        <p class="descripcion">Estudiante de Desarrollo de Software.
            Me gusta crear paginas web.
        </p>
        <button class="button">Contactar</button>
    </div>

    <div class="audio">
        
    </div>
    
</body>
</html>
